services:
  learnix-postgres:
    image: postgres:18
    container_name: learnix-postgres
    environment:
      POSTGRES_DB: learnix_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jara130308
    ports:
      - "55432:5432"
    volumes:
      - learnix_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learnix_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  learnix_pgdata:
